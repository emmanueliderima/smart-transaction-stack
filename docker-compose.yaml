version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: solinfra-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: solinfra
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: oven/bun
    working_dir: /app
    volumes:
      - .:/app
    command: bun run src/index.ts
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://dev:devpass@postgres:5432/solinfra

volumes:
  postgres_data:
  cache_data:
    driver: local