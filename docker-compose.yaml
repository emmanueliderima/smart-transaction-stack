version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: solinfra-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: solinfra
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  cache_data:
    driver: local